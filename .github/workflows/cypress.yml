name: Cypress Tests

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  test:
    name: Cypress Tests
    runs-on: ubuntu-latest
    environment: testing
    strategy:
      fail-fast: false
      matrix:
        containers: [1]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Cypress binary
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Extract short commit hash
        id: short-sha
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6.3.0
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: test-${{ steps.short-sha.outputs.short_sha }}-${{ matrix.containers }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_type: schema-only

      - name: Generate E2E OTP code
        id: e2e-otp
        run: echo "code=$(shuf -i 100000-999999 -n 1)" >> $GITHUB_OUTPUT

      - name: Build app
        run: pnpm build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Start app
        run: pnpm start &
        env:
          NODE_ENV: test
          E2E_OTP_CODE: ${{ steps.e2e-otp.outputs.code }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Wait for app
        run: pnpm dlx wait-on http://localhost:3000 --timeout 60000 --strict

      - name: Cypress run
        uses: cypress-io/github-action@v7.1.2
        with:
          browser: chrome
          record: true
          parallel: true
          group: 'Chrome'
        env:
          E2E_OTP_CODE: ${{ steps.e2e-otp.outputs.code }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_NO_WARNINGS: 1
          TERM: xterm

      - name: Delete neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3.2.0
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: test-${{ steps.short-sha.outputs.short_sha }}-${{ matrix.containers }}
          api_key: ${{ secrets.NEON_API_KEY }}